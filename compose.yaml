name: bagisto-storefront

services:
  storefront:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    image: bagisto-storefront:local
    init: true
    working_dir: /app
    ports:
      - "127.0.0.1:${STOREFRONT_PORT:-3000}:3000"
    environment:
      HUSKY: "0"
      NUXT_API_SECRET: ${NUXT_API_SECRET:-}
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://backend.bagisto.local/graphql}
      SOURCE_WAIT_SECONDS: ${SOURCE_WAIT_SECONDS:-3}
    volumes:
      - ./src:/app
      - node_modules:/app/node_modules
      - nuxt_cache:/app/.nuxt
      - yarn_cache:/app/.yarn/cache
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          if [ ! -f package.json ]; then exit 0; fi;
          node -e "fetch('http://127.0.0.1:3000').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

volumes:
  node_modules:
  nuxt_cache:
  yarn_cache:
